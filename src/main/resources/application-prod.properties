# Server
server.port=${PORT:8080}

# MongoDB
spring.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Firebase Configuration Properties
integrations.fcm.enabled=${INTEGRATIONS_FCM_ENABLED:false}
firebase.project.id=${FIREBASE_PROJECT_ID}
firebase.credentials.base64=${FIREBASE_CREDENTIALS_BASE64}

# Resend
resend.api.key=${RESEND_API_KEY:}

# Stripe live catalog
stripe.plans.basic.product-id=${STRIPE_BASIC_PRODUCT_ID}
stripe.plans.basic.monthly-price-id=${STRIPE_BASIC_MONTHLY_PRICE_ID}
stripe.plans.basic.yearly-price-id=${STRIPE_BASIC_YEARLY_PRICE_ID}

stripe.plans.pro.product-id=${STRIPE_PRO_PRODUCT_ID}
stripe.plans.pro.monthly-price-id=${STRIPE_PRO_MONTHLY_PRICE_ID}
stripe.plans.pro.yearly-price-id=${STRIPE_PRO_YEARLY_PRICE_ID}

stripe.plans.premium.product-id=${STRIPE_PREMIUM_PRODUCT_ID}
stripe.plans.premium.monthly-price-id=${STRIPE_PREMIUM_MONTHLY_PRICE_ID}
stripe.plans.premium.yearly-price-id=${STRIPE_PREMIUM_YEARLY_PRICE_ID}
