# Server
server.port=${PORT:8080}

# MongoDB
spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.database=${MONGODB_DATABASE}
spring.data.mongodb.auto-index-creation=true

# JWT
authorization.jwt.secret=${AUTHORIZATION_JWT_SECRET}
authorization.jwt.expiration.days=${AUTHORIZATION_JWT_EXPIRATION_DAYS:7}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Firebase / FCM
integrations.fcm.enabled=${FCM_ENABLED:false}
firebase.project.id=${FIREBASE_PROJECT_ID:}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}

# Resend
resend.api.key=${RESEND_API_KEY:}